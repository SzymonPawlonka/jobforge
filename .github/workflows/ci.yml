name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api-python/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analyzer-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: services/analyzer-go/go.sum
      - run: go test ./...
